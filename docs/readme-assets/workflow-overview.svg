<svg width="1400" height="1180" viewBox="0 0 1400 1180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="40" y1="24" x2="1360" y2="1156" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF5EA"/>
      <stop offset="1" stop-color="#EFE1C8"/>
    </linearGradient>
    <linearGradient id="spine" x1="700" y1="190" x2="700" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2D678D"/>
      <stop offset="1" stop-color="#2F6B51"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#22384B" flood-opacity="0.12"/>
    </filter>
    <style>
      .title { font: 700 40px 'Segoe UI', 'PingFang SC', sans-serif; fill: #0F2942; }
      .subtitle { font: 500 20px 'Segoe UI', 'PingFang SC', sans-serif; fill: #4D687B; }
      .eyebrow { font: 700 14px 'Segoe UI', 'PingFang SC', sans-serif; fill: #7A6A52; letter-spacing: 0.16em; }
      .cardLabel { font: 700 13px 'Segoe UI', 'PingFang SC', sans-serif; fill: #FFFDF8; letter-spacing: 0.08em; }
      .cardTitle { font: 700 24px 'Segoe UI', 'PingFang SC', sans-serif; fill: #152E48; }
      .cardText { font: 500 15px 'Segoe UI', 'PingFang SC', sans-serif; fill: #567186; }
      .stepNum { font: 700 28px 'Segoe UI', 'PingFang SC', sans-serif; fill: #FFFDF8; text-anchor: middle; dominant-baseline: middle; }
      .footerTitle { font: 700 15px 'Segoe UI', 'PingFang SC', sans-serif; fill: #6E624F; letter-spacing: 0.12em; }
      .footerText { font: 500 18px 'Segoe UI', 'PingFang SC', sans-serif; fill: #4D687B; }
    </style>
  </defs>

  <rect x="20" y="20" width="1360" height="1140" rx="36" fill="url(#bg)"/>
  <circle cx="180" cy="132" r="88" fill="#FFF7E8" fill-opacity="0.72"/>
  <circle cx="1230" cy="1060" r="110" fill="#F3E4C8" fill-opacity="0.72"/>
  <circle cx="1190" cy="160" r="62" fill="#E8F1F4" fill-opacity="0.7"/>

  <text x="90" y="96" class="title">WilberFlow Workflow Overview</text>
  <text x="90" y="130" class="subtitle">从 Wilber 事件筛选到最终标准化事件目录的完整本地流水线</text>

  <text x="90" y="182" class="eyebrow">LOCAL BATCH PIPELINE</text>
  <path d="M700 206V990" stroke="url(#spine)" stroke-width="6" stroke-linecap="round"/>

  <g filter="url(#shadow)">
    <rect x="120" y="198" width="470" height="136" rx="26" fill="#FFFDF8" stroke="#D8C9AE"/>
    <rect x="150" y="220" width="118" height="26" rx="13" fill="#1E5B84"/>
    <text x="209" y="238" class="cardLabel" text-anchor="middle">EVENT QUERY</text>
    <text x="150" y="272" class="cardTitle">1. 搜索事件</text>
    <text x="150" y="298" class="cardText">按时间、震级、深度、区域等条件，</text>
    <text x="150" y="320" class="cardText">从 Wilber / EarthScope 得到候选事件。</text>
  </g>
  <path d="M590 253H660" stroke="#2D678D" stroke-width="4" stroke-linecap="round"/>
  <circle cx="700" cy="253" r="32" fill="#1E5B84"/>
  <text x="700" y="254" class="stepNum">1</text>

  <g filter="url(#shadow)">
    <rect x="810" y="314" width="470" height="136" rx="26" fill="#FFFDF8" stroke="#D8C9AE"/>
    <rect x="840" y="336" width="126" height="26" rx="13" fill="#1E5B84"/>
    <text x="903" y="354" class="cardLabel" text-anchor="middle">STATION FILTER</text>
    <text x="840" y="388" class="cardTitle">2. 筛选台站</text>
    <text x="840" y="414" class="cardText">按台网、台站、通道、震中距、方位角和</text>
    <text x="840" y="436" class="cardText">location priority 获取每个事件的台站。</text>
  </g>
  <path d="M740 369H810" stroke="#2D678D" stroke-width="4" stroke-linecap="round"/>
  <circle cx="700" cy="369" r="32" fill="#1E5B84"/>
  <text x="700" y="370" class="stepNum">2</text>

  <g filter="url(#shadow)">
    <rect x="120" y="430" width="470" height="136" rx="26" fill="#FFFDF8" stroke="#D8C9AE"/>
    <rect x="150" y="452" width="144" height="26" rx="13" fill="#1E5B84"/>
    <text x="222" y="470" class="cardLabel" text-anchor="middle">REQUEST PLAN</text>
    <text x="150" y="504" class="cardTitle">3. 提交请求</text>
    <text x="150" y="530" class="cardText">生成请求参数、写入 request_plan.csv，</text>
    <text x="150" y="552" class="cardText">并根据配置决定是否立即提交到 Wilber。</text>
  </g>
  <path d="M590 485H660" stroke="#2D678D" stroke-width="4" stroke-linecap="round"/>
  <circle cx="700" cy="485" r="32" fill="#1E5B84"/>
  <text x="700" y="486" class="stepNum">3</text>

  <g filter="url(#shadow)">
    <rect x="810" y="546" width="470" height="136" rx="26" fill="#FFFDF8" stroke="#D8C9AE"/>
    <rect x="840" y="568" width="162" height="26" rx="13" fill="#1E5B84"/>
    <text x="921" y="586" class="cardLabel" text-anchor="middle">MAIL + DOWNLOAD</text>
    <text x="840" y="620" class="cardTitle">4. 收信与下载</text>
    <text x="840" y="646" class="cardText">轮询 QQ IMAP 邮箱中的 [Success] 邮件，</text>
    <text x="840" y="668" class="cardText">并把对应下载包保存到当前批次目录。</text>
  </g>
  <path d="M740 601H810" stroke="#2D678D" stroke-width="4" stroke-linecap="round"/>
  <circle cx="700" cy="601" r="32" fill="#1E5B84"/>
  <text x="700" y="602" class="stepNum">4</text>

  <g filter="url(#shadow)">
    <rect x="120" y="662" width="470" height="136" rx="26" fill="#FFFDF8" stroke="#D8C9AE"/>
    <rect x="150" y="684" width="122" height="26" rx="13" fill="#2F6B51"/>
    <text x="211" y="702" class="cardLabel" text-anchor="middle">EXTRACTION</text>
    <text x="150" y="736" class="cardTitle">5. 解压与原始保留</text>
    <text x="150" y="762" class="cardText">解压 Wilber 压缩包，保留原始目录，</text>
    <text x="150" y="784" class="cardText">同时输出 extraction manifest 方便核对。</text>
  </g>
  <path d="M590 717H660" stroke="#2F6B51" stroke-width="4" stroke-linecap="round"/>
  <circle cx="700" cy="717" r="32" fill="#2F6B51"/>
  <text x="700" y="718" class="stepNum">5</text>

  <g filter="url(#shadow)">
    <rect x="810" y="778" width="470" height="136" rx="26" fill="#FFFDF8" stroke="#D8C9AE"/>
    <rect x="840" y="800" width="172" height="26" rx="13" fill="#2F6B51"/>
    <text x="926" y="818" class="cardLabel" text-anchor="middle">RESPONSE REMOVAL</text>
    <text x="840" y="852" class="cardTitle">6. 去仪器响应</text>
    <text x="840" y="878" class="cardText">优先本地 SAC + SACPZ，缺失时回退到</text>
    <text x="840" y="900" class="cardText">ObsPy + IRIS，按通道逐个处理波形。</text>
  </g>
  <path d="M740 833H810" stroke="#2F6B51" stroke-width="4" stroke-linecap="round"/>
  <circle cx="700" cy="833" r="32" fill="#2F6B51"/>
  <text x="700" y="834" class="stepNum">6</text>

  <g filter="url(#shadow)">
    <rect x="120" y="894" width="470" height="136" rx="26" fill="#FFFDF8" stroke="#D8C9AE"/>
    <rect x="150" y="916" width="124" height="26" rx="13" fill="#2F6B51"/>
    <text x="212" y="934" class="cardLabel" text-anchor="middle">FINAL OUTPUT</text>
    <text x="150" y="968" class="cardTitle">7. 整理最终结果</text>
    <text x="150" y="994" class="cardText">输出 07_final 事件目录，并保留 metadata、</text>
    <text x="150" y="1016" class="cardText">summary、failures 与 logs 便于复查。</text>
  </g>
  <path d="M590 949H660" stroke="#2F6B51" stroke-width="4" stroke-linecap="round"/>
  <circle cx="700" cy="949" r="32" fill="#2F6B51"/>
  <text x="700" y="950" class="stepNum">7</text>

  <text x="90" y="1074" class="footerTitle">BATCH MODE</text>
  <text x="90" y="1110" class="footerText">每次运行都会写入独立批次目录，可补跑、可复用、可缓存、可追踪日志。</text>
</svg>
